<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wallace Archive Reader · Mobile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&family=Rampart+One&family=Rubik+Iso&display=swap" rel="stylesheet">

  <script async src="https://a.magsrv.com/ad-provider.js"></script>
  <script>
    window.AdProvider = window.AdProvider || [];
  </script>

  <style>
    :root{
      --bg:#080a10;
      --bg2:#0e1119;
      --ink:#f7f8fb;
      --muted:rgba(247,248,251,.74);
      --muted2:rgba(247,248,251,.5);
      --stroke:rgba(255,255,255,.12);
      --stroke-strong:rgba(255,255,255,.18);
      --panel:rgba(255,255,255,.045);
      --panel2:rgba(255,255,255,.075);
      --shadow:0 18px 48px rgba(0,0,0,.42);
      --radius:20px;
      --title-font:"Rampart One", system-ui, sans-serif;
      --subtitle-font:"Rubik Iso", system-ui, sans-serif;
      --ui-font:"Handjet", system-ui, sans-serif;
      --pill-font:"Handjet", system-ui, sans-serif;
      --readerW:min(100%, 820px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--ui-font);
      scroll-behavior:smooth;
    }

    body{
      background:
        radial-gradient(900px 520px at 12% 0%, rgba(255,255,255,.06), transparent 58%),
        radial-gradient(720px 480px at 88% 10%, rgba(255,255,255,.035), transparent 55%),
        linear-gradient(180deg, #0d1119 0%, #090b11 40%, #080a10 100%);
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    button, input, select{ font:inherit; }

    .page-progress{
      position:fixed;
      inset:0 0 auto 0;
      z-index:7000;
      height:3px;
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(10px);
      pointer-events:none;
    }

    .page-progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, rgba(255,255,255,.95), rgba(255,255,255,.65));
      box-shadow:0 0 18px rgba(255,255,255,.22);
      transition:width .08s linear;
    }

    .mobile-shell{
      width:100%;
      max-width:980px;
      margin:0 auto;
      padding:10px 10px 18px;
    }

    .mobile-top{
      position:sticky;
      top:0;
      z-index:5000;
      padding-top:calc(env(safe-area-inset-top, 0px) + 6px);
      margin-bottom:12px;
      background:linear-gradient(180deg, rgba(8,10,16,.92), rgba(8,10,16,.84) 72%, rgba(8,10,16,0));
      backdrop-filter:blur(12px);
    }

    .mobile-card{
      border:1px solid var(--stroke);
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .mobile-head{
      padding:14px;
      display:grid;
      gap:12px;
    }

    .mobile-copy{
      display:grid;
      gap:6px;
      text-align:center;
    }

    .mobile-eyebrow{
      margin:0;
      color:var(--muted2);
      font-family:var(--subtitle-font);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .mobile-copy h1{
      margin:0;
      font-family:var(--title-font);
      font-size:clamp(1.5rem, 7vw, 2.35rem);
      line-height:1.03;
      font-weight:400;
      letter-spacing:.01em;
      word-break:break-word;
    }

    .mobile-copy p{
      margin:0;
      color:var(--muted);
      font-family:var(--subtitle-font);
      font-size:11px;
      line-height:1.45;
      letter-spacing:.02em;
    }

    .mobile-tools{
      display:grid;
      gap:10px;
    }

    .mobile-search,
    .mobile-select{
      width:100%;
      min-height:48px;
      padding:0 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      outline:none;
      background:rgba(0,0,0,.22);
      color:var(--ink);
      font-size:15px;
      line-height:1.2;
    }

    .mobile-search::placeholder{
      color:rgba(247,248,251,.42);
    }

    .mobile-search:focus,
    .mobile-select:focus{
      border-color:rgba(255,255,255,.3);
      box-shadow:0 0 0 4px rgba(255,255,255,.06);
    }

    .mobile-select-wrap{
      position:relative;
    }

    .mobile-select{
      appearance:none;
      -webkit-appearance:none;
      padding-right:44px;
      cursor:pointer;
      touch-action:manipulation;
    }

    .mobile-select-wrap::after{
      content:"";
      position:absolute;
      right:16px;
      top:50%;
      width:10px;
      height:10px;
      border-right:2px solid rgba(255,255,255,.8);
      border-bottom:2px solid rgba(255,255,255,.8);
      transform:translateY(-65%) rotate(45deg);
      pointer-events:none;
      opacity:.9;
    }

    .mobile-meta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .mobile-stat,
    .mobile-chip{
      min-height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:12px;
      line-height:1;
    }

    .mobile-chip{
      cursor:pointer;
      color:#0f1219;
      background:#fff;
      font-weight:700;
      box-shadow:0 8px 24px rgba(255,255,255,.12);
    }

    .search-results{
      display:grid;
      gap:8px;
      max-height:220px;
      overflow:auto;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }

    .search-result-pill{
      appearance:none;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:var(--ink);
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-size:14px;
      line-height:1.2;
      text-align:left;
      font-family:var(--pill-font);
      letter-spacing:.02em;
    }

    .layout{
      max-width:100%;
      margin:0 auto;
      padding:0;
      display:block;
    }

    .reader{
      width:var(--readerW);
      margin:0 auto;
      min-width:0;
      display:grid;
      gap:10px;
    }

    .slot,
    .image-wrap,
    .note,
    .traversal-shell,
    .chapter-meta{
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .slot{
      min-height:250px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      padding:2px;
    }

    .image-wrap{
      background:#000;
      margin-bottom:4px;
    }

    .image-wrap img{
      display:block;
      width:100%;
      height:auto;
      background:#000;
    }

    .chapter-meta,
    .note,
    .traversal-shell{
      background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.032));
      backdrop-filter:blur(8px);
    }

    .chapter-meta{
      padding:14px;
      display:grid;
      gap:10px;
    }

    .meta-row{
      display:grid;
      gap:8px;
    }

    .chapter-tag{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      line-height:1.1;
      text-align:center;
    }

    .chapter-note{
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
      text-align:center;
    }

    .note{
      padding:14px;
      line-height:1.65;
      color:var(--muted);
      font-size:14px;
      text-align:center;
    }

    .traversal-shell{
      padding:14px;
      display:grid;
      gap:12px;
    }

    .traversal-kicker{
      margin:0;
      color:var(--muted2);
      text-align:center;
      font-family:var(--subtitle-font);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .continue-prompt{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
    }

    .traversal-bar{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .traversal-pill{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:#fff;
      color:#0f1219;
      min-height:44px;
      padding:10px 14px;
      border-radius:16px;
      cursor:pointer;
      font-size:14px;
      line-height:1.1;
      font-weight:700;
      font-family:var(--pill-font);
      letter-spacing:.02em;
      box-shadow:0 10px 24px rgba(255,255,255,.12);
      white-space:normal;
      text-align:center;
    }

    .traversal-pill.current{
      background:#dfe6ff;
      color:#0a0d14;
      box-shadow:0 14px 30px rgba(223,230,255,.22);
    }

    .reader-anchor{
      display:block;
      width:100%;
      height:1px;
    }

    .between-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      width:100%;
    }

    .between-grid .slot{
      min-height:250px;
      padding:8px;
    }

    .end-grid{
      display:none !important;
    }

    .exo-slot ins,
    .slot ins{
      display:block !important;
      margin:0 auto !important;
    }

    .mobile-bottom-space{
      height:16px;
    }

    @media (min-width: 700px){
      .mobile-shell{
        padding-left:14px;
        padding-right:14px;
      }

      .traversal-bar{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body data-reader-mode="mobile">
  <div class="page-progress" aria-hidden="true">
    <div class="page-progress-bar" id="pageProgressBar"></div>
  </div>

  <div class="mobile-shell">
    <header class="mobile-top">
      <div class="mobile-card">
        <div class="mobile-head">
          <div class="mobile-copy">
            <p class="mobile-eyebrow">Archive Reader</p>
            <h1 id="workTitle">Loading…</h1>
            <p>Compact mode. Clean scroll. Between-page ads only.</p>
          </div>

          <div class="mobile-tools">
            <input
              id="chapterSearchInput"
              class="mobile-search"
              type="search"
              placeholder="Search works and chapters…"
              autocomplete="off"
            />

            <div class="mobile-select-wrap">
              <select id="mobileJumpSelect" class="mobile-select" aria-label="Jump to chapter">
                <option value="">Loading navigation…</option>
              </select>
            </div>

            <div class="mobile-meta">
              <div class="mobile-stat" id="chapterSearchStat">Ready to jump</div>
              <button class="mobile-chip" id="scrollToReaderBtn" type="button">To Reader</button>
            </div>

            <div class="search-results" id="chapterSearchResults"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="layout">
      <main class="reader" id="reader"></main>
    </div>

    <div class="mobile-bottom-space"></div>
  </div>

  <script defer src="index.js"></script>

  <script>
    (() => {
      "use strict";

      const LIBRARY_FILE = "library.json";

      function normalizeKey(value) {
        return String(value ?? "").trim().toLowerCase();
      }

      function titleCaseSlug(slug) {
        return String(slug ?? "")
          .replace(/[_-]+/g, " ")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\\b\\w/g, ch => ch.toUpperCase());
      }

      function getQueryState() {
        const url = new URL(window.location.href);
        return {
          dir: url.searchParams.get("dir") || "",
          file: url.searchParams.get("file") || ""
        };
      }

      async function loadMobileSelect() {
        const select = document.getElementById("mobileJumpSelect");
        if (!select) return;

        try {
          const res = await fetch(LIBRARY_FILE, { cache: "no-store" });
          if (!res.ok) throw new Error("Failed to load library.json");

          const data = await res.json();
          const works = Array.isArray(data.works) ? data.works : [];
          const state = getQueryState();

          let html = '<option value="">Jump to chapter…</option>';

          for (const work of works) {
            const workLabel = work.display || titleCaseSlug(work.slug);
            html += `<optgroup label="${workLabel.replace(/"/g, "&quot;")}">`;

            for (const entry of (work.entries || [])) {
              const entryLabel = entry.subtitle || titleCaseSlug(entry.slug);
              const value = `${work.slug}|||${entry.slug}`;
              const selected =
                normalizeKey(work.slug) === normalizeKey(state.dir) &&
                normalizeKey(entry.slug) === normalizeKey(state.file)
                  ? " selected"
                  : "";

              html += `<option value="${value.replace(/"/g, "&quot;")}"${selected}>${workLabel} · ${entryLabel.replace(/</g, "&lt;")}</option>`;
            }

            html += "</optgroup>";
          }

          select.innerHTML = html;
        } catch (err) {
          console.error(err);
          select.innerHTML = '<option value="">Failed to load navigation</option>';
        }
      }

      function wireMobileBits() {
        const select = document.getElementById("mobileJumpSelect");
        const toReaderBtn = document.getElementById("scrollToReaderBtn");

        if (select) {
          select.addEventListener("change", () => {
            const raw = select.value || "";
            if (!raw.includes("|||")) return;

            const [dir, file] = raw.split("|||");
            const url = new URL(window.location.href);
            url.searchParams.set("dir", dir);
            url.searchParams.set("file", file);
            window.location.href = url.toString();
          });
        }

        if (toReaderBtn) {
          toReaderBtn.addEventListener("click", () => {
            const target = document.getElementById("readerTopAnchor") || document.getElementById("reader");
            if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        wireMobileBits();
        loadMobileSelect().catch(console.error);
      });
    })();
  </script>
</body>
</html>
